name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: test (${{ matrix.os }}, node ${{ matrix.node }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node: [22, 24]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - run: npm ci

      - run: npm run typecheck

      - run: npm test

      - run: npm run build

      # Pack-install smoke test: catches broken bin/files/ESM config that
      # unit tests never exercise.
      - name: Smoke test packed tarball
        shell: bash
        run: |
          set -euo pipefail
          TARBALL=$(npm pack --silent | tail -n1)
          mkdir -p /tmp/smoke && cd /tmp/smoke
          npm init -y > /dev/null
          npm install "$GITHUB_WORKSPACE/$TARBALL" > /dev/null
          npx envshield --version

name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  id-token: write # npm provenance

jobs:
  # Tags on commits that are not on main (e.g. tagged feature branches) must
  # never publish a release.
  guard:
    name: tag is on main
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Ensure tagged commit is an ancestor of main
        run: |
          git fetch origin main --quiet
          if ! git merge-base --is-ancestor HEAD origin/main; then
            echo "::error::Tag ${GITHUB_REF_NAME} points to a commit that is not on main — refusing to release"
            exit 1
          fi

  verify:
    name: verify (${{ matrix.os }}, node ${{ matrix.node }})
    needs: guard
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node: [22, 24]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  publish:
    needs: verify
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          # Node 24 ships npm >= 11.5, required for OIDC trusted publishing
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Verify tag matches package.json version
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::package.json version ($PKG_VERSION) != tag ($TAG_VERSION)"
            exit 1
          fi

      - run: npm ci

      # Auth via npm Trusted Publishing (OIDC) — no token anywhere
      - run: npm publish --provenance --access public

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" --generate-notes
